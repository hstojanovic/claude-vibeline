version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: saturday
      time: "06:00"
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: saturday
      time: "06:00"
    groups:
      astral:
        patterns:
          - "ruff"
          - "ty"
          - "uv-build"
      requests:
        patterns:
          - "requests"
          - "types-requests"
