name: Security

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: '0 6 * * 6'

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv tool install pip-audit
      - run: uv export --all-groups --all-extras --no-hashes --no-emit-project | pip-audit -r /dev/stdin
      - run: uv run --no-project python -c "import tomllib; [print(r) for r in tomllib.load(open('pyproject.toml','rb'))['build-system']['requires']]" | pip-audit -r /dev/stdin
      - uses: github/codeql-action/init@v4
        with:
          languages: python
      - uses: github/codeql-action/analyze@v4
