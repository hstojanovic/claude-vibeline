name: Security

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: '0 6 * * 6'

permissions:
  contents: read

# Remove entries once fixed versions are available
env:
  # CVE-2026-4539: pygments 2.19.2 — low-severity ReDoS in AdlLexer (CVSS 3.3), local-only, disputed by maintainers
  IGNORE_VULNS: >-
    --ignore-vuln CVE-2026-4539

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv tool install pip-audit
      - name: Audit dependencies
        run: uv export --all-groups --all-extras --no-hashes --no-emit-project | pip-audit $IGNORE_VULNS -r /dev/stdin
      - name: Audit build dependencies
        run: uv run --no-project python -c "import tomllib; [print(r) for r in tomllib.load(open('pyproject.toml','rb'))['build-system']['requires']]" | pip-audit $IGNORE_VULNS -r /dev/stdin
      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: python
      - uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
