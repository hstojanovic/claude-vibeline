name: Security

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: '0 6 * * 6'

permissions:
  contents: read

# Remove entries once fixed versions are available
env:
  # CVE-2026-4539: pygments 2.19.2 — low-severity ReDoS in AdlLexer (CVSS 3.3), local-only, disputed by maintainers
  IGNORE_VULNS: >-
    --ignore-vuln CVE-2026-4539

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv tool install pip-audit
      - name: Audit dependencies
        run: uv export --all-groups --all-extras --no-hashes --no-emit-project | pip-audit $IGNORE_VULNS -r /dev/stdin
      - name: Audit build dependencies
        run: uv run --no-project python -c "import tomllib; [print(r) for r in tomllib.load(open('pyproject.toml','rb'))['build-system']['requires']]" | pip-audit $IGNORE_VULNS -r /dev/stdin
      - uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: python
      - uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
