name: Security

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: '0 6 * * 6'

permissions:
  contents: read

# Remove entries once fixed versions are available
env:
  # CVE-2026-4539: pygments 2.19.2 — low-severity ReDoS in AdlLexer (CVSS 3.3), local-only, disputed by maintainers
  IGNORE_VULNS: >-
    --ignore-vuln CVE-2026-4539

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - run: uv tool install pip-audit
      - name: Audit dependencies
        run: uv export --all-groups --all-extras --no-hashes --no-emit-project | pip-audit $IGNORE_VULNS -r /dev/stdin
      - name: Audit build dependencies
        run: uv run --no-project python -c "import tomllib; [print(r) for r in tomllib.load(open('pyproject.toml','rb'))['build-system']['requires']]" | pip-audit $IGNORE_VULNS -r /dev/stdin
      - uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          languages: python
      - uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
